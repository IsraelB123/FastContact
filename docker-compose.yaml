version: '3.8'

services:
  # Servidor de Base de Datos
  db:
    image: mariadb:10.4 # Misma versión que tu SQL
    container_name: fc_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: fc_database
      MYSQL_USER: user_fastcontact
      MYSQL_PASSWORD: password_seguro
    volumes:
      - ./mysql_data:/var/lib/mysql
      # Importante: Pon tu archivo .sql en una carpeta llamada /docker-entrypoint-initdb.d/ 
      # para que se cargue automáticamente al iniciar.
      - ./fc_database.sql:/docker-entrypoint-initdb.d/fc_database.sql
    ports:
      - "3306:3306"

  # Servidor Web y PHP
  app:
    image: php:8.0-apache # Versión compatible con tu volcado
    container_name: fc_app
    restart: always
    depends_on:
      - db
    volumes:
      - ./src:/var/www/html # Aquí irá tu código PHP puro
    ports:
      - "8080:80"
    # Instalamos extensiones necesarias para que PHP hable con MariaDB
    command: >
      sh -c "docker-php-ext-install mysqli pdo pdo_mysql && apache2-foreground"
  jenkins:
    image: jenkins/jenkins:lts
    container_name: fc_jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080" # Entrarás por localhost:8081
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Permite a Jenkins usar Docker